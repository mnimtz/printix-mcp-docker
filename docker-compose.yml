# =============================================================================
# Printix MCP — Docker Compose (Referenz-Setup)
# =============================================================================
# Erst-Installation:
#   1.  cp .env.example .env      # MCP_PUBLIC_URL & Co. anpassen
#   2.  docker compose up -d
#   3.  Browser: http://localhost:8080   → Erstkonfiguration im Web-UI
#
# Ports ändern: Passe die Einträge unter `ports:` unten an (z.B. "9000:8080").
# Die linke Seite ist der Host-Port, rechts der Container-Port (nicht ändern).
#
# Update auf neue Version:
#   docker compose pull && docker compose up -d
#
# Logs / Health:
#   docker compose logs -f printix-mcp
#   docker compose ps
# =============================================================================

services:
  printix-mcp:
    image: ghcr.io/mnimtz/printix-mcp-docker:${PRINTIX_TAG:-latest}
    # Alternative fürs lokale Bauen (statt image:latest):
    #   build: .
    container_name: printix-mcp
    restart: unless-stopped

    environment:
      # --- Basis ---------------------------------------------------------------
      # Öffentliche URL (z.B. via Cloudflare Tunnel / Reverse Proxy).
      # Wenn leer: Web-UI funktioniert über den Request-Host (LAN).
      # Kann auch zur Laufzeit in der Admin-UI (/admin/settings) gesetzt werden —
      # DB-Setting überschreibt diese Env-Variable.
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-info}

      # --- Ports im CONTAINER (nicht ändern; Mapping erfolgt unter `ports:`) --
      WEB_PORT: 8080
      MCP_PORT: 8765
      CAPTURE_PORT: 8775

      # --- Capture-Server (optional) -------------------------------------------
      # true  = eigener Server auf CAPTURE_PORT (8775) — nur nötig, wenn
      #         Webhooks von außen auf einem separaten Port ankommen sollen.
      # false = Webhooks laufen über MCP_PORT (8765). [Default]
      CAPTURE_ENABLED: ${CAPTURE_ENABLED:-false}

      # --- IPP/IPPS Listener (Cloud Print) -------------------------------------
      # 0 = deaktiviert (IPP läuft nur auf WEB_PORT). 631 = Standard-IPP-Port.
      IPP_PORT: ${IPP_PORT:-0}
      # TLS-Zertifikat für IPPS (wenn IPP_PORT > 0):
      IPPS_CERTFILE: ${IPPS_CERTFILE:-}
      IPPS_KEYFILE: ${IPPS_KEYFILE:-}

    ports:
      # Format:  "HOST-PORT:CONTAINER-PORT"
      # Zum Umziehen auf einen anderen Host-Port NUR die linke Zahl ändern.
      - "8080:8080"       # Web-UI (Admin, Login, Dashboard)
      - "8765:8765"       # MCP-Endpoint (Claude, OAuth, SSE)
      - "8775:8775"       # Capture-Webhook — nur relevant wenn CAPTURE_ENABLED=true
      # IPP/IPPS nur aktivieren, wenn IPP_PORT gesetzt ist:
      # - "631:631"

    volumes:
      # Persistente Daten: SQLite-DB, Fernet-Key, Session-Key, Report-Templates
      - printix-data:/data
      # Optional: TLS-Zertifikate für IPPS einblenden (read-only)
      # - ./certs:/certs:ro

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  printix-data:
    # Wenn du einen Host-Pfad statt eines Named Volumes willst, ersetze oben
    # "printix-data:/data" durch "./data:/data" und lösche diesen volumes:-Block.
    # Wichtig bei Bind-Mount: Ownership 1000:1000 setzen, sonst kann der
    # Container nicht schreiben:
    #   mkdir -p ./data && sudo chown -R 1000:1000 ./data
    driver: local
